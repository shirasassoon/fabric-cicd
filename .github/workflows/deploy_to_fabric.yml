name: Deploy to Fabric Workspace

# This workflow demonstrates an enterprise end-to-end deployment of Microsoft
# Fabric workspace items using fabric-cicd with a Service Principal (SPN)
# authenticated via OIDC Workload Identity Federation (no client secrets).
#
# Prerequisites:
#   1. Register an Azure AD app (SPN).
#   2. Configure a Federated Credential on the app for this GitHub repo/environment.
#   3. Grant the SPN "Contributor" role on the target Fabric workspace.
#   4. Add the following secrets to each GitHub Environment (PPE/PROD):
#        AZURE_TENANT_ID      – Azure AD tenant ID
#        AZURE_CLIENT_ID      – SPN application (client) ID
#        FABRIC_WORKSPACE_ID  – Target Fabric workspace ID
#      (No AZURE_CLIENT_SECRET needed!)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment (e.g., PPE, PROD)"
        required: true
        default: "PROD"
        type: choice
        options:
          - PPE
          - PROD

permissions:
  contents: read
  id-token: write  # Required for OIDC token request

jobs:
  deploy:
    name: Deploy Fabric Items
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login via OIDC (Workload Identity Federation)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fabric-cicd

      - name: Deploy to Fabric workspace
        env:
          FABRIC_WORKSPACE_ID: ${{ secrets.FABRIC_WORKSPACE_ID }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          python -u .deploy/deploy_fabric_workspace.py

      - name: Upload error log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fabric-cicd-error-log
          path: fabric_cicd.error.log
          if-no-files-found: ignore
